<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireWatch Pro — Incident Command Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:#050709; --surface:#0a0f14; --surface2:#0f1820; --surface3:#131f2a;
            --border:#162030; --border2:#1e3044;
            --text:#8aabbc; --text-dim:#3a5568; --text-hi:#cce4f4;
            --red:#ff3b3b; --amber:#ffaa00; --green:#00e87a; --cyan:#00c8f8; --blue:#2060ff; --purple:#b060ff;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,100,180,0.07) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 90% 20%,rgba(255,59,59,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
        body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,0.022) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
        
        header{background:linear-gradient(180deg,rgba(10,15,20,0.98),rgba(10,15,20,0.92));border-bottom:1px solid var(--border2);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(0,200,248,0.05),0 8px 32px rgba(0,0,0,0.6);}
        .brand{display:flex;align-items:center;gap:16px;}
        .brand-text h1{font-family:'Share Tech Mono',monospace;font-size:17px;letter-spacing:3px;color:var(--text-hi);}
        #clock{font-family:'Share Tech Mono',monospace;font-size:26px;color:var(--cyan);letter-spacing:4px;}
        
        .header-right{display:flex;align-items:center;gap:10px;}
        .rx-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 12px;border:1px solid var(--border2);border-radius:2px;color:var(--text-dim);}
        .rx-badge.live{color:var(--green);border-color:rgba(0,232,122,0.35);text-shadow:0 0 8px rgba(0,232,122,0.4);}
        
        .ai-btn{display:flex;align-items:center;gap:8px;padding:8px 18px;border:1px solid rgba(176,96,255,0.5);border-radius:3px;background:rgba(176,96,255,0.08);color:var(--purple);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.25s;}
        .ai-btn:hover{background:rgba(176,96,255,0.18);box-shadow:0 0 20px rgba(176,96,255,0.3);}

        .conn-pill{display:flex;align-items:center;gap:8px;padding:7px 16px;border:1px solid var(--border2);border-radius:3px;background:var(--surface2);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;}
        .indicator{width:7px;height:7px;border-radius:50%;background:var(--text-dim);}
        .indicator.connected{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

        main{padding:20px 32px;display:grid;grid-template-columns:280px 1fr;gap:18px;}
        .panel-card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:20px;margin-bottom:14px;}
        .stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
        .stat-value{font-family:'IBM Plex Mono',monospace;color:var(--cyan);}

        .sensor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
        .s-card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:18px;}
        .s-value{font-family:'Share Tech Mono',monospace;font-size:36px;color:var(--text-hi);}
        .gauge{height:2px;background:rgba(255,255,255,0.04);margin:10px 0;overflow:hidden;}
        .gauge-fill{height:100%;background:var(--cyan);transition:width 0.5s;}

        #connPanel{display:none;position:fixed;top:72px;right:32px;background:var(--surface2);border:1px solid var(--border2);padding:20px;width:300px;z-index:200;border-radius:8px;}
        .conn-input{width:100%;background:var(--bg);border:1px solid var(--border2);color:#fff;padding:8px;margin:10px 0;font-family:monospace;}
        .conn-btn{width:100%;padding:10px;cursor:pointer;margin-bottom:5px;border:none;font-weight:bold;}
        .primary{background:var(--cyan);color:#000;}
        
        /* AI Overlay Styles */
        #aiPanel{position:fixed;top:0;right:-440px;bottom:0;width:440px;background:var(--surface);border-left:1px solid var(--purple);z-index:400;transition:right 0.3s cubic-bezier(0.22,1,0.36,1);padding:20px;overflow-y:auto;}
        #aiPanel.open{right:0;}
        .ai-risk-chip{padding:15px;border-radius:5px;margin:15px 0;font-weight:bold;text-align:center;letter-spacing:2px;}
        .risk-high{background:rgba(255,59,59,0.15);color:var(--red);border:1px solid var(--red);}
        .ai-summary{background:var(--surface2);padding:15px;border-left:3px solid var(--purple);line-height:1.6;}
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-text">
            <h1>FIREWATCH PRO</h1>
        </div>
    </div>
    <div class="header-center">
        <div id="clock">00:00:00</div>
    </div>
    <div class="header-right">
        <div class="rx-badge" id="rxBadge">WAITING</div>
        <button class="ai-btn" onclick="openAIPanel()">AI ANALYZE</button>
        <div class="conn-pill" onclick="document.getElementById('connPanel').style.display='block'">
            <div class="indicator" id="indicator"></div>
            <span id="connLabel">OFFLINE</span>
        </div>
    </div>
</header>

<div id="connPanel">
    <h3 style="font-size:12px;margin-bottom:10px">SERVER CONNECTION</h3>
    <input id="wsUrl" type="text" class="conn-input" placeholder="wss://app.onrender.com">
    <button class="conn-btn primary" onclick="connectWS()">CONNECT</button>
    <button class="conn-btn" onclick="startDemo()">START DEMO</button>
    <button class="conn-btn" style="background:#444;color:#fff" onclick="document.getElementById('connPanel').style.display='none'">CLOSE</button>
</div>

<main>
    <div class="unit-panel">
        <div class="panel-card">
            <h2 style="font-size:14px;margin-bottom:15px;color:var(--text-hi)">UNIT ALPHA-1</h2>
            <div class="stat-row"><span>Skin Temp</span><span class="stat-value" id="mv-skin">--</span></div>
            <div class="stat-row"><span>Pressure</span><span class="stat-value" id="mv-pressure">--</span></div>
            <div class="stat-row"><span>Uptime</span><span class="stat-value" id="mv-uptime">00:00:00</span></div>
        </div>
    </div>

    <div class="right-col">
        <div class="sensor-grid">
            <div class="s-card">
                <div style="font-size:10px;color:var(--text-dim)">MQ-7 CO</div>
                <div class="s-value" id="v-mq7">---</div>
                <div class="gauge"><div class="gauge-fill" id="g-mq7" style="width:0%"></div></div>
            </div>
            <div class="s-card">
                <div style="font-size:10px;color:var(--text-dim)">MQ-2 SMOKE</div>
                <div class="s-value" id="v-mq2">---</div>
                <div class="gauge"><div class="gauge-fill" id="g-mq2" style="width:0%;background:var(--red)"></div></div>
            </div>
            <div class="s-card">
                <div style="font-size:10px;color:var(--text-dim)">BODY TEMP</div>
                <div class="s-value" id="v-temp">---</div>
                <div class="gauge"><div class="gauge-fill" id="g-temp" style="width:0%;background:var(--cyan)"></div></div>
            </div>
            <div class="s-card">
                <div style="font-size:10px;color:var(--text-dim)">ALTITUDE</div>
                <div class="s-value" id="v-alt">---</div>
                <div class="gauge"><div class="gauge-fill" id="g-alt" style="width:50%;background:var(--blue)"></div></div>
            </div>
        </div>
        
        <div class="panel-card" style="height:200px">
            <h3 style="font-size:11px;color:var(--text-dim);margin-bottom:10px">SYSTEM LOG</h3>
            <div id="log" style="font-family:monospace;font-size:11px;overflow-y:auto;height:140px;color:var(--cyan)"></div>
        </div>
    </div>
</main>

<div id="aiPanel">
    <button onclick="closeAIPanel()" style="float:right;background:none;border:none;color:var(--text-dim);cursor:pointer">CLOSE [X]</button>
    <h2 style="font-family:'Share Tech Mono';color:var(--purple);letter-spacing:2px">AI ANALYSIS</h2>
    <hr style="border:none;border-top:1px solid var(--border2);margin:15px 0">
    <div id="aiContent">
        <p style="color:var(--text-dim)">Waiting for live sensor data to perform threat assessment...</p>
    </div>
</div>

<script>
    let ws = null;
    let lastRx = null;
    let startTime = Date.now();
    const liveData = { mq2: 0, mq7: 0, temp: 0, pressure: 0 };

    // Set initial WS URL based on current host
    window.onload = () => {
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        document.getElementById('wsUrl').value = `${protocol}://${window.location.host}`;
        setInterval(updateClock, 1000);
    };

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8);
        const up = Math.floor((Date.now() - startTime)/1000);
        document.getElementById('mv-uptime').textContent = new Date(up * 1000).toISOString().substr(11, 8);
        
        if(lastRx) {
            const diff = Math.floor((Date.now() - lastRx)/1000);
            const badge = document.getElementById('rxBadge');
            badge.textContent = diff < 5 ? "RX LIVE" : `RX ${diff}s AGO`;
            badge.className = diff < 5 ? "rx-badge live" : "rx-badge";
        }
    }

    function connectWS() {
        const url = document.getElementById('wsUrl').value;
        log(`Connecting to ${url}...`);
        ws = new WebSocket(url);
        
        ws.onopen = () => {
            log("Connected to FireWatch Server", "green");
            document.getElementById('indicator').className = "indicator connected";
            document.getElementById('connLabel').textContent = "CONNECTED";
            document.getElementById('connPanel').style.display = "none";
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            processData(data);
        };

        ws.onclose = () => {
            log("Disconnected from Server", "red");
            document.getElementById('indicator').className = "indicator";
            document.getElementById('connLabel').textContent = "OFFLINE";
        };
    }

    function processData(d) {
        lastRx = Date.now();
        
        // Map ESP32 keys to UI
        if(d.mq2_raw) updateSensor('mq2', d.mq2_raw, 4095);
        if(d.mq7_raw) updateSensor('mq7', d.mq7_raw, 4095);
        if(d.skin_temp) {
            document.getElementById('v-temp').textContent = d.skin_temp + "°C";
            document.getElementById('mv-skin').textContent = d.skin_temp + "°C";
            document.getElementById('g-temp').style.width = (d.skin_temp / 50 * 100) + "%";
            liveData.temp = d.skin_temp;
        }
        if(d.pressure) {
            document.getElementById('mv-pressure').textContent = d.pressure + " hPa";
            liveData.pressure = d.pressure;
            // Simple altitude calc
            const alt = Math.round(44330 * (1 - Math.pow(d.pressure/1013.25, 0.1903)));
            document.getElementById('v-alt').textContent = alt + "m";
        }
    }

    function updateSensor(id, val, max) {
        document.getElementById(`v-${id}`).textContent = val;
        document.getElementById(`g-${id}`).style.width = (val / max * 100) + "%";
        liveData[id] = val;
    }

    function log(m, color="var(--cyan)") {
        const div = document.getElementById('log');
        div.innerHTML = `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${m}</div>` + div.innerHTML;
    }

    function openAIPanel() {
        document.getElementById('aiPanel').classList.add('open');
        runAI();
    }

    function closeAIPanel() {
        document.getElementById('aiPanel').classList.remove('open');
    }

    function runAI() {
        const content = document.getElementById('aiContent');
        const risk = liveData.mq2 > 2500 || liveData.temp > 39 ? "HIGH" : "LOW";
        
        content.innerHTML = `
            <div class="ai-risk-chip ${risk === 'HIGH' ? 'risk-high' : ''}">
                ${risk} THREAT LEVEL
            </div>
            <div class="ai-summary">
                ${risk === 'HIGH' ? 
                    '<b>CRITICAL:</b> High levels of combustible gas or body heat detected. Immediate evacuation of personnel advised.' : 
                    'System parameters are within safe operating limits. No immediate threat to personnel detected.'}
            </div>
            <ul style="margin-top:20px; font-size:12px; color:var(--text); line-height:2">
                <li>CO Level: ${liveData.mq7} ADC</li>
                <li>Smoke Level: ${liveData.mq2} ADC</li>
                <li>Body Temp: ${liveData.temp}°C</li>
            </ul>
        `;
    }

    function startDemo() {
        document.getElementById('connPanel').style.display = "none";
        log("Demo Mode Active", "var(--amber)");
        setInterval(() => {
            processData({
                mq2_raw: 400 + Math.random() * 200,
                mq7_raw: 100 + Math.random() * 50,
                skin_temp: 36.5 + Math.random(),
                pressure: 1012 + Math.random() * 2
            });
        }, 2000);
    }
</script>

</body>
</html>
