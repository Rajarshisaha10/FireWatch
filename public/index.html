<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireWatch Pro</title>

<style>
body {
  background:#0a0f14;
  color:#cce4f4;
  font-family: monospace;
  text-align:center;
  padding:40px;
}

.status { font-size:18px; margin-bottom:20px; }
.connected { color:#00e87a; }
.error { color:red; }

.card {
  background:#131f2a;
  padding:15px;
  margin:10px;
  border-radius:8px;
  display:inline-block;
  min-width:180px;
}
</style>
</head>

<body>

<h1>🔥 FireWatch Pro</h1>

<div id="status" class="status">CONNECTING...</div>

<div class="card">
  <h3>Temperature</h3>
  <div id="temp">--</div>
</div>

<div class="card">
  <h3>Pressure</h3>
  <div id="pressure">--</div>
</div>

<div class="card">
  <h3>MQ2</h3>
  <div id="mq2">--</div>
</div>

<div class="card">
  <h3>MQ7</h3>
  <div id="mq7">--</div>
</div>

<script>

// 🔥 YOUR FINAL SERVER (DO NOT CHANGE)
const WS_URL = "wss://firewatchpro.onrender.com";

let ws;

function connectWS() {

  document.getElementById("status").innerText = "CONNECTING...";

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log("✅ CONNECTED");
    document.getElementById("status").innerText = "CONNECTED";
    document.getElementById("status").className = "status connected";
  };

  ws.onmessage = (event) => {
    console.log("📡 DATA:", event.data);

    const d = JSON.parse(event.data);

    document.getElementById("temp").innerText =
      d.skin_temp ? d.skin_temp + " °C" : "--";

    document.getElementById("pressure").innerText =
      d.pressure ? d.pressure + " hPa" : "--";

    document.getElementById("mq2").innerText =
      d.mq2_raw ?? "--";

    document.getElementById("mq7").innerText =
      d.mq7_raw ?? "--";
  };

  ws.onerror = (err) => {
    console.error("❌ WS ERROR:", err);
    document.getElementById("status").innerText = "ERROR";
    document.getElementById("status").className = "status error";
  };

  ws.onclose = () => {
    console.log("🔌 DISCONNECTED - retrying...");
    document.getElementById("status").innerText = "RECONNECTING...";
    setTimeout(connectWS, 3000);
  };
}

// 🔥 AUTO CONNECT
connectWS();

</script>

</body>
</html>
